<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חפש את האפיקומן 🫓</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b45309;
  --cream: #fdf6ec;
  --cream2: #f5ede0;
  --brown: #2d1a0e;
  --brown2: #6b4226;
  --purple: #7c3aed;
  --purple2: #6d28d9;
  --green: #15803d;
  --border: #e0ccb0;
  --shadow: rgba(45,26,14,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  color: var(--brown);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(180,83,9,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

/* ══ HOME ══ */
#screen-home {
  justify-content: center;
  padding: 40px 20px 60px;
  gap: 32px;
}
.home-header { text-align: center; }
.home-title { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
.home-sub { font-size: 0.95rem; color: var(--brown2); font-weight: 700; margin-top: 4px; }

.home-card {
  width: 100%; max-width: 360px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: 0 6px 28px var(--shadow);
  display: flex; flex-direction: column; gap: 20px;
}
.card-label {
  font-size: 0.82rem; font-weight: 700; color: var(--gold);
  text-align: center; letter-spacing: 0.5px;
}
.code-input {
  font-family: 'Heebo', sans-serif;
  font-size: 1.8rem; font-weight: 900;
  width: 100%; height: 62px;
  border: 2.5px solid var(--border);
  border-radius: 12px; padding: 0 16px;
  outline: none; text-align: center;
  background: var(--cream); color: var(--brown);
  letter-spacing: 5px;
  transition: border-color 0.15s, box-shadow 0.15s;
  direction: ltr;
}
.code-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.code-input.wrong { border-color: #dc2626; background: #fef2f2; animation: shake 0.3s ease; }
.code-feedback { font-size: 0.88rem; font-weight: 700; min-height: 18px; text-align: center; color: #dc2626; }

.btn-enter {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1.05rem;
  padding: 13px; border-radius: 12px; border: none;
  background: var(--purple); color: #fff; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-enter:hover { background: var(--purple2); transform: translateY(-2px); }
.btn-enter:active { transform: scale(0.97); }

/* Progress */
.progress-section { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; }
.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.85rem; font-weight: 700; color: var(--brown2);
}
.progress-bar-bg {
  background: #e8d8c0; border-radius: 99px; height: 12px; overflow: hidden;
  border: 1.5px solid #d4b896;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #f59e0b);
  border-radius: 99px;
  transition: width 0.7s cubic-bezier(.4,0,.2,1);
}
.progress-stations {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
}
.station-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 900; color: #b39070;
  transition: background 0.3s, border-color 0.3s;
}
.station-dot.done { background: var(--green); border-color: var(--green); color: #fff; }

/* ══ SUCCESS OVERLAY ══ */
#success-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(15,10,5,0.55);
  align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
#success-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.success-card {
  background: #fff;
  border: 3px solid #86efac;
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 340px; width: 90%;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: popUp 0.35s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popUp {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.success-emoji { font-size: 3.5rem; }
.success-title { font-size: 1.7rem; font-weight: 900; color: var(--green); }
.success-sub { font-size: 0.95rem; color: var(--brown2); line-height: 1.5; }

/* ══ WIN OVERLAY ══ */
#win-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(15,10,5,0.7);
  align-items: center; justify-content: center;
}
#win-overlay.show { display: flex; }
.win-card {
  background: #fff;
  border: 3px solid var(--gold);
  border-radius: 28px;
  padding: 48px 36px;
  max-width: 360px; width: 90%;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  animation: popUp 0.4s cubic-bezier(.175,.885,.32,1.275);
}
.win-emoji { font-size: 4rem; }
.win-title { font-size: 2rem; font-weight: 900; color: var(--gold); }
.win-text { font-size: 1rem; color: var(--brown2); line-height: 1.6; }
.btn-win {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1rem;
  padding: 12px 28px; border-radius: 12px; border: none;
  background: var(--gold); color: #fff; cursor: pointer;
  transition: background 0.15s;
}
.btn-win:hover { background: #92400e; }

/* ══ PUZZLE ══ */
#screen-puzzle { padding: 0; gap: 0; }
.puzzle-topbar {
  width: 100%; background: #fff; border-bottom: 2px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px var(--shadow); flex-shrink: 0;
}
.topbar-label { font-size: 0.95rem; font-weight: 900; color: var(--gold); }
.btn-back {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.88rem;
  padding: 7px 16px; border-radius: 8px; border: 2px solid var(--border);
  background: transparent; color: var(--brown2); cursor: pointer; transition: background 0.15s;
}
.btn-back:hover { background: var(--cream2); }
#puzzle-iframe { width: 100%; border: none; min-height: calc(100vh - 54px); flex: 1; }

.btn-reset-all {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.8rem;
  padding: 7px 18px; border-radius: 99px;
  border: 2px solid var(--border); background: transparent;
  color: #b39070; cursor: pointer; transition: background 0.15s, color 0.15s;
}
.btn-reset-all:hover { background: var(--cream2); color: var(--brown2); }

@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">🫓 האפיקומן</div>
    <div class="home-sub">הכניסו את קוד התחנה שמצאתם</div>
  </div>

  <div class="home-card">
    <div class="card-label">קוד תחנה</div>
    <input type="text" class="code-input" id="code-input"
      placeholder="- - - - - -"
      inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false"
      maxlength="8"
    />
    <div class="code-feedback" id="code-feedback"></div>
    <button class="btn-enter" onclick="checkCode()">כניסה ◀</button>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span>התקדמות</span>
      <span id="progress-count">0 / 10</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-stations" id="progress-stations"></div>
  </div>

  <button class="btn-reset-all" onclick="resetAll()">↺ איפוס התקדמות</button>
</div>

<!-- ══ PUZZLE ══ -->
<div id="screen-puzzle" class="screen">
  <div class="puzzle-topbar">
    <button class="btn-back" onclick="goHome()">← חזרה</button>
    <div class="topbar-label" id="topbar-label"></div>
    <div style="width:64px"></div>
  </div>
  <iframe id="puzzle-iframe" title="חידה"></iframe>
</div>

<!-- ══ SUCCESS OVERLAY ══ -->
<div id="success-overlay">
  <div class="success-card">
    <div class="success-emoji">🎉</div>
    <div class="success-title">כל הכבוד!</div>
    <div class="success-sub" id="success-sub">התחנה הושלמה!</div>
  </div>
</div>

<!-- ══ WIN OVERLAY ══ -->
<div id="win-overlay">
  <div class="win-card">
    <div class="win-emoji">🏆</div>
    <div class="win-title">מצאתם את האפיקומן!</div>
    <div class="win-text">🎉 כל הכבוד! כל התחנות הושלמו!<br><br>חג פסח שמח! 🌿</div>
    <button class="btn-win" onclick="document.getElementById('win-overlay').classList.remove('show')">🫓 סיום</button>
  </div>
</div>

<script>
// ══════════════════════════════
// STATION DATA
// ══════════════════════════════
const STATIONS = [
  { id:1,  name:'תחנה 1',  icon:'🐱', code:'1357', completionType:'imageAnswer' },
  { id:2,  name:'תחנה 2',  icon:'🦋', code:'2489', completionType:'imageAnswer' },
  { id:3,  name:'תחנה 3',  icon:'🔢', code:'9876', completionType:'imageAnswer' },
  { id:4,  name:'תחנה 4',  icon:'🎨', code:'1982', completionType:'imageAnswer' },
  { id:5,  name:'תחנה 5',  icon:'💻', code:'2026', completionType:'imageAnswer' },
  { id:6,  name:'תחנה 6',  icon:'🐦', code:'1493', completionType:'imageAnswer' },
  { id:7,  name:'תחנה 7',  icon:'🌸', code:'1234', completionType:'imageAnswer' },
  { id:8,  name:'תחנה 8',  icon:'🥕', code:'4334', completionType:'imageAnswer' },
  { id:9,  name:'תחנה 9',  icon:'🫓', code:'2222', completionType:'imageAnswer' },
  { id:10, name:'תחנה 10', icon:'📜', code:'1470', completionType:'imageAnswer' }
];

// ══════════════════════════════
// STATE
// ══════════════════════════════
const STORAGE_KEY = 'afikoman_kids_v1';
let state = { completed: [] };
let currentStation = null;

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) state = JSON.parse(r); } catch(e) {}
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function isCompleted(id) { return state.completed.includes(id); }
function markCompleted(id) {
  if (!isCompleted(id)) { state.completed.push(id); saveState(); }
}

// ══════════════════════════════
// SCREENS
// ══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('home');
  renderProgress();
  const inp = document.getElementById('code-input');
  inp.value = '';
  inp.className = 'code-input';
  document.getElementById('code-feedback').textContent = '';
  setTimeout(() => inp.focus(), 150);
}

// ══════════════════════════════
// CODE CHECK
// ══════════════════════════════
document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});
document.getElementById('code-input').addEventListener('input', () => {
  document.getElementById('code-input').className = 'code-input';
  document.getElementById('code-feedback').textContent = '';
});

function checkCode() {
  const inp = document.getElementById('code-input');
  const val = inp.value.trim();
  const fb = document.getElementById('code-feedback');
  if (!val) { fb.textContent = 'הכניסו קוד'; return; }

  const st = STATIONS.find(s => s.code === val);
  if (!st) {
    inp.className = 'code-input wrong';
    setTimeout(() => inp.className = 'code-input', 320);
    fb.textContent = 'קוד לא נכון — נסו שוב 🔍';
    inp.value = '';
    setTimeout(() => inp.focus(), 100);
    return;
  }

  currentStation = st;
  launchPuzzle();
}

// ══════════════════════════════
// PUZZLE
// ══════════════════════════════
function launchPuzzle() {
  document.getElementById('topbar-label').textContent =
    `${currentStation.icon} תחנה ${currentStation.id} — ${currentStation.name}`;

  const iframe = document.getElementById('puzzle-iframe');
  iframe.srcdoc = buildStationHtml(currentStation);
  showScreen('puzzle');
}

// Called from inside iframe via postMessage
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'STATION_COMPLETE') {
    handleCompletion();
  }
});

function handleCompletion() {
  markCompleted(currentStation.id);
  renderProgress();

  const sub = document.getElementById('success-sub');
  sub.textContent = 'תחנה הושלמה!';
  document.getElementById('success-overlay').classList.add('show');

  setTimeout(() => {
    document.getElementById('success-overlay').classList.remove('show');
    goHome();
    if (state.completed.length === STATIONS.length) {
      setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 400);
    }
  }, 2200);
}

// ══════════════════════════════
// PROGRESS
// ══════════════════════════════
function renderProgress() {
  const n = state.completed.length;
  const pct = Math.round(n / STATIONS.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = n + ' / ' + STATIONS.length;

  const container = document.getElementById('progress-stations');
  container.innerHTML = '';
  STATIONS.forEach(st => {
    const dot = document.createElement('div');
    dot.className = 'station-dot' + (isCompleted(st.id) ? ' done' : '');
    dot.textContent = isCompleted(st.id) ? '✓' : st.id;
    dot.title = st.name;
    container.appendChild(dot);
  });
}

function resetAll() {
  if (!confirm('למחוק את כל ההתקדמות?')) return;
  state = { completed: [] };
  saveState();
  renderProgress();
}


// ══════════════════════════════
// INIT
// ══════════════════════════════
loadState();
renderProgress();
setTimeout(() => document.getElementById('code-input').focus(), 200);

// ══════════════════════════════════════════════════════
// BUILD STATION HTML — each station sends postMessage
// on completion
// ══════════════════════════════════════════════════════
function buildStationHtml(st) {
  const postMsg = `parent.postMessage({type:'STATION_COMPLETE'},'*');`;

  if (st.id === 1) return station1Html(postMsg);
  if (st.id === 2) return station2Html(postMsg);
  if (st.id === 3) return station3Html(postMsg);
  if (st.id === 4) return station4Html(postMsg);
  if (st.id === 5) return station5Html(postMsg);
  if (st.id === 6) return station6Html(postMsg);
  if (st.id === 7) return station7Html(postMsg);
  if (st.id === 8) return station8Html(postMsg);
  if (st.id === 9) return station9Html(postMsg);
  if (st.id === 10) return station10Html(postMsg);
  return '<p>תחנה לא נמצאה</p>';
}

// ─────────────────────────────────────────────────────
// STATION 1 — grid puzzle, answer field for unmarked פ
// ─────────────────────────────────────────────────────
function station1Html(postMsg) {
return `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');:root{--bg:#f0ece3;--cell-bg:#fff;--cell-border:#c8b89a;--cell-text:#2d2016;--pressed-bg:#c084fc;--pressed-border:#9333ea;--pressed-text:#fff;--highlight-bg:#f2cfee;--highlight-border:#c084c0;--btn-bg:#2d2016;--btn-text:#f0ece3;--shadow:rgba(45,32,22,0.13)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Heebo',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}h1{font-size:1.8rem;font-weight:900;color:var(--cell-text)}#instruction-box{background:#fff;border:2px solid var(--cell-border);border-radius:14px;padding:14px 22px;font-size:1rem;font-weight:700;color:var(--cell-text);text-align:center;max-width:460px;box-shadow:0 2px 12px var(--shadow);line-height:1.8}#instruction-box .letter{display:inline-block;background:var(--highlight-bg);border:1.5px solid var(--highlight-border);border-radius:6px;padding:1px 8px;font-size:1.1rem;margin:0 2px}#grid-wrapper{background:#fff;border-radius:18px;box-shadow:0 6px 32px var(--shadow);padding:14px;border:2px solid var(--cell-border)}#grid{display:grid;grid-template-columns:repeat(6,60px);grid-template-rows:repeat(6,60px);gap:6px;direction:ltr}.cell{width:60px;height:60px;border-radius:10px;border:2.5px solid var(--cell-border);background:var(--cell-bg);font-size:1.45rem;font-weight:900;color:var(--cell-text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,color .15s,transform .1s;user-select:none;position:relative;box-shadow:0 2px 6px var(--shadow)}.cell:hover:not(.pressed){border-color:#9333ea;background:#f5f0ff;transform:translateY(-2px) scale(1.04)}.cell.pressed{background:var(--pressed-bg);border-color:var(--pressed-border);color:var(--pressed-text);transform:scale(0.93)}.cell.pressed::after{content:'✓';position:absolute;top:2px;left:5px;font-size:.6rem;color:#fff}.cell.highlighted{background:var(--highlight-bg);border-color:var(--highlight-border)}.cell.highlighted.pressed{background:var(--pressed-bg);border-color:var(--pressed-border)}#answer-section{background:#fff;border:2px solid var(--cell-border);border-radius:14px;padding:16px 24px;max-width:360px;width:100%;box-shadow:0 2px 12px var(--shadow);display:flex;flex-direction:column;align-items:center;gap:10px}#answer-section label{font-size:.95rem;font-weight:700;color:var(--cell-text);text-align:center}#answer-row{display:flex;gap:10px;align-items:center}#final-answer{font-family:'Heebo',sans-serif;font-size:1.4rem;font-weight:900;width:90px;height:50px;border:2.5px solid var(--cell-border);border-radius:10px;outline:none;text-align:center;background:var(--bg);color:var(--cell-text);transition:border-color .15s}#final-answer:focus{border-color:#9333ea;box-shadow:0 0 0 3px rgba(147,51,234,.15)}#final-answer.correct{border-color:#16a34a;background:#f0fdf4;color:#15803d}#final-answer.wrong{border-color:#dc2626;background:#fef2f2;animation:shake .28s ease}#btn-check-answer{font-family:'Heebo',sans-serif;font-weight:700;font-size:.95rem;padding:10px 22px;border-radius:10px;border:none;background:#7c3aed;color:#fff;cursor:pointer;transition:background .15s}#btn-check-answer:hover{background:#6d28d9}#answer-feedback{font-size:.9rem;font-weight:700;min-height:20px;color:#dc2626;text-align:center}#controls{display:flex;gap:10px}#btn-reset{font-family:'Heebo',sans-serif;font-weight:700;font-size:.9rem;padding:10px 24px;border-radius:10px;border:none;cursor:pointer;background:var(--btn-bg);color:var(--btn-text)}#live-count{font-size:.9rem;font-weight:700;color:var(--cell-text);text-align:center}@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}@media(max-width:420px) ;font-weight:700;min-height:20px;color:#6b7280;text-align:center}#feedback.success{color:#16a34a}#feedback.error{color:#dc2626}</style></head><body><h1>🌿 פירמידת פסח</h1><div id="clues"><div class="clue"><span class="clue-num">1.</span><span>מספר השנים בגימטריה שבהן נדדו בני ישראל במדבר</span></div><div class="clue"><span class="clue-num">2.</span><span>האוכל שאכלו בני ישראל במדבר</span></div><div class="clue"><span class="clue-num">3.</span><span>דמות מרשעת ממגילת אסתר</span></div><div class="clue"><span class="clue-num">4.</span><span>מילה נרדפת לסופר</span></div><div class="clue"><span class="clue-num">5.</span><span>כמה קושיות נשאל אם נשיר את הקושיות פעמיים?</span></div></div><div id="pyramid"></div><div id="controls"><button id="btn-check">בדיקה</button><button id="btn-reset">↺ איפוס</button></div><div id="feedback"></div><script>const ANSWERS=['מ','מן','המן','מונה','שמונה'];let inputs=[];const finals={'נ':'ן','כ':'ך','מ':'ם','פ':'ף','צ':'ץ'},reg={'ן':'נ','ך':'כ','ם':'מ','ף':'פ','ץ':'צ'};function build(){const pyr=document.getElementById('pyramid');pyr.innerHTML='';inputs=[];ANSWERS.forEach((word,ri)=>{const row=document.createElement('div');row.className='prow';const rowInputs=[];[...word].forEach((_,ci)=>{const inp=document.createElement('input');inp.type='text';inp.maxLength=2;inp.className='brick';inp.autocomplete='off';inp.autocorrect='off';inp.spellcheck=false;inp.addEventListener('input',e=>{let v=e.target.value.replace(/[^א-ת]/g,'');if(v.length>1)v=v[v.length-1];inp.value=v;inp.classList.remove('correct','wrong');document.getElementById('feedback').textContent='';document.getElementById('feedback').className='';if(v)advance(ri,ci)});inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value)retreat(ri,ci);if(e.key==='Enter')check()});row.appendChild(inp);rowInputs.push(inp)});inputs.push(rowInputs);pyr.appendChild(row)})}function advance(ri,ci){if(ci<inputs[ri].length-1)inputs[ri][ci+1].focus();else if(ri<inputs.length-1)inputs[ri+1][0].focus()}function retreat(ri,ci){if(ci>0)inputs[ri][ci-1].focus();else if(ri>0)inputs[ri-1][inputs[ri-1].length-1].focus()}function check(){let allOk=true,anyFilled=false;ANSWERS.forEach((word,ri)=>{[...word].forEach((letter,ci)=>{const inp=inputs[ri][ci];if(inp.value)anyFilled=true;if(!inp.value){allOk=false;return}const ok=inp.value===letter||finals[letter]===inp.value||reg[letter]===inp.value;inp.classList.toggle('correct',ok);inp.classList.toggle('wrong',!ok);if(!ok)allOk=false})});const fb=document.getElementById('feedback');if(!anyFilled){fb.textContent='מלאו לפחות תיבה אחת.';fb.className='error'}else if(allOk){fb.textContent='🎉 כל הכבוד! כל התשובות נכונות!';fb.className='success';setTimeout(()=>{${postMsg}},900)}else{fb.textContent='יש אותיות שגויות.';fb.className='error'}}function reset(){inputs.flat().forEach(i=>{i.value='';i.classList.remove('correct','wrong')});const fb=document.getElementById('feedback');fb.textContent='';fb.className='';inputs[0]?.[0]?.focus()}document.getElementById('btn-check').addEventListener('click',check);document.getElementById('btn-reset').addEventListener('click',reset);build();<\/script></body></html>`;

return `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Heebo',sans-serif;background:#fdf6ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 14px 28px;gap:12px}h1{font-size:1.4rem;font-weight:900;color:#92400e;text-align:center}#letters-display{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.letter-tile{width:50px;height:50px;background:#7c3aed;color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;box-shadow:0 3px 8px rgba(124,58,237,.3)}#instruction{font-size:.95rem;color:#78716c;text-align:center;line-height:1.6;max-width:380px}#instruction strong{color:#92400e}#input-area{display:flex;gap:10px;align-items:center;justify-content:center}#word-input{font-family:'Heebo',sans-serif;font-size:1.25rem;font-weight:700;width:190px;height:50px;border:2.5px solid #d4b896;border-radius:12px;padding:0 14px;outline:none;text-align:center;background:#fff;color:#2d1a0e;transition:border-color .15s}#word-input:focus{border-color:#7c3aed}#word-input.shake{animation:shake .3s ease;border-color:#dc2626}#btn-submit{font-family:'Heebo',sans-serif;font-weight:700;font-size:.95rem;padding:0 22px;height:50px;border-radius:12px;border:none;background:#7c3aed;color:#fff;cursor:pointer}#btn-submit:hover{background:#6d28d9}#feedback{font-size:.95rem;font-weight:700;min-height:22px;text-align:center}#feedback.success{color:#16a34a}#feedback.error{color:#dc2626}#feedback.info{color:#92400e}#progress-bar-wrap{width:100%;max-width:380px;background:#e7ddd0;border-radius:99px;height:11px;overflow:hidden}#progress-bar{height:100%;background:#7c3aed;border-radius:99px;transition:width .4s ease;width:0%}#progress-label{font-size:.88rem;color:#78716c;font-weight:700;text-align:center}#found-section{width:100%;max-width:420px}#found-section h3{font-size:.9rem;font-weight:700;color:#92400e;margin-bottom:8px;text-align:center}#found-words{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:36px}.found-word{background:#fff;border:2px solid #7c3aed;color:#7c3aed;border-radius:99px;padding:3px 14px;font-size:.95rem;font-weight:700;animation:pop .25s ease}@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}#btn-reset{font-family:'Heebo',sans-serif;font-weight:700;font-size:.85rem;padding:8px 22px;border-radius:10px;border:2px solid #d4b896;background:#fff;color:#78716c;cursor:pointer}</style></head><body><h1>🫓 משחק האפיקומן</h1><div id="letters-display"></div><div id="instruction">מצאו לפחות <strong>5 מילים</strong> מהאותיות של המילה <strong>אפיקומן</strong>.<br>כל אות — פעם אחת בלבד בכל מילה.</div><div id="input-area"><input type="text" id="word-input" placeholder="כתבו מילה..." autocomplete="off" autocorrect="off" spellcheck="false"/><button id="btn-submit">הוסף</button></div><div id="feedback"></div><div id="progress-bar-wrap"><div id="progress-bar"></div></div><div id="progress-label">נמצאו <span id="count">0</span> מילים — מטרה: 5</div><div id="found-section"><h3>המילים שמצאתם</h3><div id="found-words"></div></div><button id="btn-reset">↺ משחק חדש</button><script>const SOURCE='אפיקומן',MIN_WORDS=5,REG_MAP={'ן':'נ','ך':'כ','ם':'מ','ף':'פ','ץ':'צ'};function normalize(word){return word.split('').map(ch=>REG_MAP[ch]||ch).join('')}const DICTIONARY=new Set(['מי','מן','קן','פי','אי','קו','קי','מו','אמן','אמי','אפי','אפו','יפו','קין','מאן','פאן','ימן','קפן','מון','אוף','אום','פוק','פון','פוי','פיק','מיק','יקו','ומן','וקן','נאם','נקם','נמק','קנא','קנו','קפו','קום','קמו','אמון','אומן','אופן','אמין','אפיק','יאמן','קומי','מוקי','פיקו','קומן','אנקה','מנוי','נאמן','נקום','פינו','קנאי','אמנו','אפנו','אפיון','מאפין','אפיקו','פינוי','נאמנו','ניקוי','קנאים','מאמין','אמינו','יאמנו','אומנו','פיקוד','אמינות','אמונות','אופנות','נאמנות','קנאיות','אני','מין','נום','פין','פאי','קפוא','קפא','אופק','איפוק','מאופק','קמין','נקום']);const DICT_N=new Set([...DICTIONARY].map(normalize));function getAvail(word){const src=[...SOURCE];for(const ch of word){const n=REG_MAP[ch]||ch;const idx=src.findIndex(s=>(REG_MAP[s]||s)===n);if(idx===-1)return false;src.splice(idx,1)}return true}let foundWords=new Set;function renderLetters(){const el=document.getElementById('letters-display');SOURCE.split('').forEach(l=>{const t=document.createElement('div');t.className='letter-tile';t.textContent=l;el.appendChild(t)})}function setFb(msg,type){const fb=document.getElementById('feedback');fb.textContent=msg;fb.className=type}function updateProgress(){const n=foundWords.size;document.getElementById('count').textContent=n;document.getElementById('progress-bar').style.width=Math.min(100,Math.round(n/MIN_WORDS*100))+'%';if(n>=MIN_WORDS){document.getElementById('progress-label').innerHTML='<span style="color:#16a34a">🎉 הגעתם ל-5! אפשר להמשיך...</span>';setTimeout(()=>{${postMsg}},600)}}function trySubmit(){const input=document.getElementById('word-input');const raw=input.value.trim();if(!raw)return;const norm=normalize(raw);if(foundWords.has(norm)){setFb('המילה כבר נמצאה! 😄','info');input.classList.add('shake');setTimeout(()=>input.classList.remove('shake'),320);input.value='';return}if(!getAvail(raw)){setFb('האותיות לא מופיעות באפיקומן 🤔','error');input.classList.add('shake');setTimeout(()=>input.classList.remove('shake'),320);input.value='';return}if(raw.length<2){setFb('מינימום 2 אותיות','error');input.value='';return}if(!DICT_N.has(norm)){setFb('"'+raw+'" לא במילון','error');input.classList.add('shake');setTimeout(()=>input.classList.remove('shake'),320);input.value='';return}foundWords.add(norm);const chip=document.createElement('div');chip.className='found-word';chip.textContent=raw;document.getElementById('found-words').appendChild(chip);updateProgress();setFb('כן! "'+raw+'" 🌟','success');input.value=''}document.getElementById('btn-submit').addEventListener('click',trySubmit);document.getElementById('word-input').addEventListener('keydown',e=>{if(e.key==='Enter')trySubmit()});document.getElementById('btn-reset').addEventListener('click',()=>{foundWords.clear();document.getElementById('found-words').innerHTML='';document.getElementById('word-input').value='';setFb('','');document.getElementById('progress-bar').style.width='0%';document.getElementById('progress-label').innerHTML='נמצאו <span id="count">0</span> מילים — מטרה: 5';document.getElementById('word-input').focus()});renderLetters();document.getElementById('word-input').focus();<\/script></body></html>`;

function station5Html(postMsg) {
return `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Heebo',sans-serif;background:#fdf6ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 36px;gap:12px}h1{font-size:1.4rem;font-weight:900;color:#92400e;text-align:center}#subtitle{font-size:.82rem;color:#78716c;text-align:center;line-height:1.5}#game-wrap{position:relative;width:100%;max-width:500px}#svg-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10}#columns{display:flex;flex-direction:row;justify-content:space-between;align-items:flex-start;gap:4px}.col{display:flex;flex-direction:column;gap:4px;flex:1}#col-nums{padding-left:4px}#col-words{padding-right:4px}.num-row,.word-row{display:flex;align-items:center;gap:4px;height:36px}.num-box{flex:1;height:36px;background:#7c3aed;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;transition:background .2s;min-width:0}.num-box.matched{background:#16a34a}.num-box.wrong-box{background:#dc2626}.word-box{flex:1;height:36px;background:#fff;border:2px solid #d4b896;color:#2d1a0e;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;padding:0 4px;text-align:center;transition:border-color .2s,background .2s;min-width:0;overflow:hidden}.word-box.matched{border-color:#16a34a;background:#f0fdf4}.word-box.wrong-box{border-color:#dc2626;background:#fef2f2}.dot{width:14px;height:14px;flex-shrink:0;border-radius:50%;background:#c4a97a;border:2px solid #a0845a;cursor:pointer;transition:background .12s,transform .1s;position:relative;z-index:20}.dot:hover{background:#7c3aed;border-color:#5b21b6;transform:scale(1.3)}.dot.selected{background:#7c3aed;border-color:#5b21b6;transform:scale(1.35)}.dot.matched{background:#16a34a;border-color:#15803d}.dot.correct{background:#16a34a;border-color:#15803d}.dot.wrong{background:#dc2626;border-color:#b91c1c}#controls{display:flex;gap:8px;justify-content:center}button{font-family:'Heebo',sans-serif;font-weight:700;font-size:.88rem;padding:9px 20px;border-radius:10px;cursor:pointer;border:none}#btn-check{background:#7c3aed;color:#fff}#btn-check:hover{background:#6d28d9}#btn-reset{background:#fff;color:#78716c;border:2px solid #d4b896}#progress{font-size:.82rem;color:#78716c;font-weight:700;text-align:center}#feedback{font-size:.9rem;font-weight:700;min-height:18px;text-align:center;color:#78716c}#feedback.success{color:#16a34a}#feedback.error{color:#dc2626}</style></head><body><h1>🔢 חבר מספר לשם</h1><div id="subtitle">לחצו על נקודה ליד המספר, אחר כך על נקודה ליד השם</div><div id="game-wrap"><svg id="svg-overlay"></svg><div id="columns"><div class="col" id="col-nums"></div><div class="col" id="col-words"></div></div></div><div id="progress">חוברו 0 מתוך 13</div><div id="feedback"></div><div id="controls"><button id="btn-check">בדיקה</button><button id="btn-reset">↺ איפוס</button></div><script>const PAIRS=[{num:1,word:'אלוהנו'},{num:2,word:'לוחות הברית'},{num:3,word:'אבות'},{num:4,word:'אמהות'},{num:5,word:'חומשי תורה'},{num:6,word:'סדרי משנה'},{num:7,word:'ימי שבתא'},{num:8,word:'ימי מילה'},{num:9,word:'ירחי לידה'},{num:10,word:'דיבריא'},{num:11,word:'כוכביא'},{num:12,word:'שבטיא'},{num:13,word:'מידיא'}];function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}let wordOrder=[],connections={},selected=null,checkedState=false;function init(){wordOrder=shuffle(PAIRS.map((_,i)=>i));connections={};selected=null;checkedState=false;buildUI()}function buildUI(){document.getElementById('col-nums').innerHTML='';document.getElementById('col-words').innerHTML='';document.getElementById('svg-overlay').inner
